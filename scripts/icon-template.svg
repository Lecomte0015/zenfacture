<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1d4ed8;stop-opacity:1" />
    </linearGradient>

    <filter id="shadow">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-gradient)"/>

  <!-- Pattern overlay -->
  <g opacity="0.05">
    <line x1="0" y1="0" x2="0" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="50" y1="0" x2="50" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="100" y1="0" x2="100" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="150" y1="0" x2="150" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="200" y1="0" x2="200" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="250" y1="0" x2="250" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="300" y1="0" x2="300" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="350" y1="0" x2="350" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="400" y1="0" x2="400" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
    <line x1="450" y1="0" x2="450" y2="512" stroke="white" stroke-width="1" stroke-dasharray="20,20"/>
  </g>

  <!-- Center circle background -->
  <circle cx="256" cy="256" r="179" fill="white" opacity="0.15"/>

  <!-- Main letter Z with shadow -->
  <text
    x="256"
    y="310"
    font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif"
    font-size="256"
    font-weight="bold"
    fill="white"
    text-anchor="middle"
    filter="url(#shadow)">Z</text>

  <!-- Decorative circle -->
  <circle cx="256" cy="256" r="215" fill="none" stroke="white" stroke-width="8" opacity="0.3"/>

  <!-- Accent dots -->
  <circle cx="381" cy="131" r="13" fill="#fbbf24"/>
  <circle cx="131" cy="381" r="13" fill="#fbbf24"/>
</svg>
